<div class="h-screen w-full flex overflow-hidden relative"
     style="background: #07081e;">

  <!-- Ambient blobs -->
  <div class="absolute top-[-10%] left-[-5%] w-[40%] h-[40%] rounded-full blur-[120px] pointer-events-none"
       style="background: rgba(99,102,241,0.08);"></div>
  <div class="absolute bottom-[-10%] right-[-5%] w-[40%] h-[40%] rounded-full blur-[120px] pointer-events-none"
       style="background: rgba(129,140,248,0.06);"></div>

  <!-- Mobile Overlay -->
  @if (sidebarOpen()) {
    <div class="fixed inset-0 z-40 bg-black/50 backdrop-blur-sm md:hidden transition-opacity"
         (click)="closeSidebar()"></div>
  }

  <!-- Sidebar -->
  <div class="fixed inset-y-0 left-0 z-50 w-64 transform transition-transform duration-300 ease-in-out md:relative md:translate-x-0"
       [class.translate-x-0]="sidebarOpen()"
       [class.-translate-x-full]="!sidebarOpen()">
    <app-super-admin-sidebar class="w-full h-full block" (click)="closeSidebar()"></app-super-admin-sidebar>
  </div>

  <!-- Main -->
  <div class="flex-1 flex flex-col min-w-0 h-full overflow-hidden z-10 w-full">
    <app-super-admin-header (toggleMenu)="toggleSidebar()"></app-super-admin-header>
    <main class="flex-1 overflow-x-hidden overflow-y-auto p-4 md:p-8">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
